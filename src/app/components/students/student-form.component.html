<div class="student-form-container">

  <div class="card">

    <h2>{{ isEdit ? 'Update Student' : 'Add Student' }}</h2>

    <form [formGroup]="form" (ngSubmit)="submit()">

      <div class="row">

        <div class="form-group">
          <label>First Name</label>
          <input type="text" formControlName="first_name">
        </div>

        <div class="form-group">
          <label>Last Name</label>
          <input type="text" formControlName="last_name">
        </div>

      </div>

      <div class="row">

        <div class="form-group">
          <label>Email</label>
          <input type="email" formControlName="email">
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" formControlName="password">
        </div>

      </div>

      <div class="row">

        <div class="form-group">
          <label>Phone</label>
          <input type="text" formControlName="phone">
        </div>

        <div class="form-group">
          <label>Gender</label>

          <select formControlName="gender">
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
          </select>

        </div>

      </div>

      <div class="row">

        <div class="form-group">
          <label>Date of Birth</label>
          <input type="date" formControlName="date_of_birth">
        </div>

        <div class="form-group">
          <label>Department</label>

          <select formControlName="department_id">
            <option *ngFor="let dept of departments" [value]="dept.id">
              {{ dept.name }}
            </option>
          </select>

        </div>

      </div>

      <div class="row">

        <div class="form-group">
          <label>Semester</label>
          <input type="number" formControlName="current_semester">
        </div>

        <div class="form-group">
          <label>Enrollment Year</label>
          <input type="number" formControlName="enrollment_year">
        </div>

      </div>

      <div class="form-group full-width">

        <label>Address</label>

        <textarea formControlName="address" rows="3"></textarea>

      </div>

      <button type="submit">
        Save Student
      </button>

      <div class="error" *ngIf="error">
        {{ error }}
      </div>

    </form>

  </div>

</div>
